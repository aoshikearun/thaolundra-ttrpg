{% extends "base.html" %}

{% block title %}Registro - Thaolundra RPG{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-box auth-box-large">
        <h1><i class="fas fa-user-plus"></i> Criar Conta</h1>

        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label for="username">Usuário *</label>
                <input type="text" id="username" name="username" class="form-input" required>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" class="form-input" required>
            </div>

            <div class="form-group">
                <label for="password">Senha *</label>
                <input type="password" id="password" name="password" class="form-input" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="nome_real">Nome Real</label>
                    <input type="text" id="nome_real" name="nome_real" class="form-input">
                </div>
                <div class="form-group">
                    <label for="nome_social">Nome Social</label>
                    <input type="text" id="nome_social" name="nome_social" class="form-input">
                </div>
            </div>

            <div class="form-group">
                <label for="data_nascimento">Data de Nascimento</label>
                <input type="date" id="data_nascimento" name="data_nascimento" class="form-input">
                <small class="form-help">Opcional - não será exibido publicamente</small>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-user-plus"></i> Criar Conta
            </button>
        </form>

        <div class="auth-links">
            <p>Já tem conta? <a href="{{ url_for('auth.login') }}">Fazer login</a></p>
        </div>
    </div>
</div>
{% endblock %}
