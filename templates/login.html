{% extends "base.html" %}

{% block title %}Login - Thaolundra RPG{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-box">
        <h1><i class="fas fa-dragon"></i> Thaolundra RPG</h1>
        <p class="auth-subtitle">Sistema de Gerenciamento</p>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="Digite seu usuário" required>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-sign-in-alt"></i> Entrar
            </button>
        </form>

        <div class="auth-links">
            <p>Não tem conta? <a href="{{ url_for('auth.register') }}">Criar conta</a></p>
            <p><a href="#"><i class="fas fa-key"></i> Esqueci minha senha</a></p>
        </div>
    </div>
</div>
{% endblock %}
